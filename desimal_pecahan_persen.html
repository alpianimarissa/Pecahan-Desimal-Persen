<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analisis FDP — Teori & Pembuktian Desimal Berulang</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<style>
:root{
  --bg-0:#f8fafc; /* Slate 50 */
  --bg-1:#f1f5f9; /* Slate 100 */
  --bg-2:#e2e8f0; /* Slate 200 */
  --card:#ffffff;
  --card-brd:#e2e8f0;
  --accent-primary:#4f46e5; /* Indigo 600 */
  --accent-secondary:#2563eb; /* Blue 600 */
  --accent-success:#059669; /* Emerald 600 */
  --accent-warning:#d97706; /* Amber 600 */
  --text-primary:#0f172a; /* Slate 900 */
  --text-muted:#475569; /* Slate 600 */
  --shadow-glow:0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.03);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  min-height:100vh;
  background:
    radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.03) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.03) 0%, transparent 40%),
    var(--bg-0);
  color:var(--text-primary);
  font-family:'Inter', sans-serif;
  position:relative;
  overflow-x:hidden;
}

h1,h2,h3,.font-display{
  font-family:'Plus Jakarta Sans', sans-serif;
  letter-spacing:-0.02em;
}

.app-shell{
  max-width:920px;
  margin:0 auto;
  padding:20px 20px 130px;
  position:relative;
  z-index:1;
  min-height:100vh;
}

/* header */
.top-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px 4px 16px;
  border-bottom:1px solid rgba(15, 23, 42, 0.08);
  margin-bottom:20px;
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
  font-family:'Plus Jakarta Sans';
  font-weight:700;
  font-size:1.15rem;
  color:var(--text-primary);
}
.brand svg{
  width:28px;
  height:28px;
  fill:none;
  stroke:var(--accent-primary);
  stroke-width:2;
}
.page-counter{
  font-size:.8rem;
  color:var(--text-muted);
  background:var(--card);
  border:1px solid var(--card-brd);
  padding:6px 14px;
  border-radius:999px;
  white-space:nowrap;
  box-shadow: 0 1px 2px rgba(0,0,0,0.02);
}

/* section chips */
.section-chips{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:2px 2px 14px;
  scrollbar-width:none;
}
.section-chips::-webkit-scrollbar{display:none;}
.chip{
  flex:none;
  font-size:.72rem;
  font-weight:600;
  padding:8px 14px;
  border-radius:999px;
  background:#ffffff;
  border:1px solid var(--card-brd);
  color:var(--text-muted);
  white-space:nowrap;
  transition:.2s;
  cursor:pointer;
  box-shadow: 0 1px 2px rgba(0,0,0,0.02);
}
.chip:hover{
  border-color:#cbd5e1;
  color:var(--text-primary);
}
.chip.active{
  background:var(--accent-primary);
  color:#fff;
  border-color:transparent;
  box-shadow:0 4px 12px rgba(79, 70, 229, 0.3);
}

/* progress bar */
.progress-track{
  height:6px;
  border-radius:999px;
  background:#e2e8f0;
  overflow:hidden;
  margin-bottom:24px;
}
.progress-fill{
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg, var(--accent-secondary), var(--accent-primary));
  transition:width .4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* content card */
#page-content{
  animation: fadein .4s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes fadein{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

.eyebrow{
  display:inline-block;
  font-size:.68rem;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#fff;
  background:var(--accent-secondary);
  padding:5px 12px;
  border-radius:6px;
  margin-bottom:12px;
}
.eyebrow.tp-concept{background:var(--accent-primary);}
.eyebrow.tp-example{background:#8b5cf6;}
.eyebrow.tp-practice{background:var(--accent-success);}
.eyebrow.tp-warmup{background:var(--accent-warning);}
.eyebrow.tp-reflect{background:#06b6d4;}

.page-title{
  font-size:1.75rem;
  font-weight:800;
  margin:0 0 8px;
  color:var(--text-primary);
  line-height:1.25;
}
.page-sub{
  color:var(--text-muted);
  font-size:.95rem;
  margin:0 0 24px;
  line-height:1.6;
}

.card{
  background:var(--card);
  border:1px solid var(--card-brd);
  border-radius:16px;
  padding:24px;
  margin-bottom:20px;
  box-shadow:var(--shadow-glow);
}
.card h3{margin-top:0; font-size:1.15rem; color:var(--text-primary); font-weight:700;}
.card p{line-height:1.7; margin:0 0 12px; font-size:.98rem;}
.card ul, .card ol{line-height:1.75; padding-left:20px; font-size:.98rem;}
.card li{margin-bottom:8px;}

.illustration{
  display:flex;
  justify-content:center;
  align-items:center;
  margin:10px 0 24px;
}
.illustration svg{max-width:100%; height:auto; filter:drop-shadow(0 4px 6px rgba(0,0,0,0.05));}

.memory-box{
  border-left:4px solid var(--accent-warning);
  background:rgba(245, 158, 11, 0.03);
  border-radius:0 12px 12px 0;
  padding:16px 20px;
  margin:20px 0;
}
.memory-box .mb-label{
  font-family:'Plus Jakarta Sans';
  font-weight:700;
  color:var(--accent-warning);
  font-size:.95rem;
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:8px;
}

.formula-box{
  background:rgba(99, 102, 241, 0.03);
  border:1px solid rgba(99, 102, 241, 0.12);
  border-radius:10px;
  padding:18px;
  margin:16px 0;
  text-align:center;
  overflow-x:auto;
}
.formula-box.small{padding:12px; margin:8px 0;}

.example-box{
  border-left:4px solid #8b5cf6;
  background:rgba(139, 92, 246, 0.02);
  border-radius:0 12px 12px 0;
  padding:18px;
  margin-bottom:18px;
}
.example-box .ex-title{font-family:'Plus Jakarta Sans'; font-weight:700; color:#6d28d9; margin-bottom:8px;}

.reveal-btn{
  margin-top:8px;
  background:rgba(139, 92, 246, 0.08);
  border:1px solid #8b5cf6;
  color:#6d28d9;
  padding:8px 16px;
  border-radius:8px;
  font-weight:600;
  font-size:.82rem;
  cursor:pointer;
  font-family:'Inter';
  transition:all 0.2s;
}
.reveal-btn:hover{background:rgba(139, 92, 246, 0.15);}
.solution{
  display:none;
  margin-top:14px;
  padding-top:14px;
  border-top:1px dashed #cbd5e1;
  animation:fadein 0.3s ease;
}
.solution.open{display:block;}

.practice-item{
  border:1px solid rgba(16, 185, 129, 0.15);
  background:rgba(16, 185, 129, 0.01);
  border-radius:14px;
  padding:20px;
  margin-bottom:16px;
}
.practice-item .pq{font-size:.98rem; margin-bottom:14px; line-height:1.65; color:var(--text-primary);}

.answer-row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
.answer-row input{
  flex:1;
  min-width:140px;
  background:#ffffff;
  border:1px solid #cbd5e1;
  border-radius:8px;
  padding:10px 14px;
  color:var(--text-primary);
  font-size:.95rem;
  font-family:'Inter';
  transition:border-color 0.2s, box-shadow 0.2s;
}
.answer-row input:focus{outline:none; border-color:var(--accent-primary); box-shadow:0 0 0 3px rgba(79, 70, 229, 0.1); background:#ffffff;}

.btn-sm{
  background:var(--accent-primary);
  color:#fff;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  font-weight:600;
  font-size:.85rem;
  cursor:pointer;
  white-space:nowrap;
  transition:background 0.2s;
}
.btn-sm:hover{background:#4f46e5;}

.feedback{
  margin-top:12px;
  font-weight:600;
  font-size:.88rem;
  padding:10px 14px;
  border-radius:8px;
  display:none;
}
.feedback.show{display:block; animation:fadein 0.3s ease;}
.feedback.correct{background:rgba(16, 185, 129, 0.08); color:#065f46; border:1px solid rgba(16, 185, 129, 0.18);}
.feedback.wrong{background:rgba(239, 68, 68, 0.08); color:#991b1b; border:1px solid rgba(239, 68, 68, 0.18);}

.grid2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
@media (max-width:640px){ .grid2{grid-template-columns:1fr;} }

.star-rate{display:flex; gap:8px; font-size:1.8rem; cursor:pointer; margin:10px 0 6px;}
.star-rate span{opacity:.25; transition:.15s;}
.star-rate span.on{opacity:1; color:var(--accent-warning);}

textarea.reflect{
  width:100%;
  min-height:80px;
  background:#ffffff;
  border:1px solid #cbd5e1;
  border-radius:8px;
  padding:14px;
  color:var(--text-primary);
  font-family:'Inter';
  font-size:.93rem;
  resize:vertical;
  transition:border-color 0.2s;
}
textarea.reflect:focus{outline:none; border-color:var(--accent-primary);}

/* bottom nav */
.bottom-nav{
  position:fixed;
  bottom:0; left:0; right:0;
  z-index:5;
  background:rgba(255, 255, 255, 0.9);
  backdrop-filter:blur(12px);
  padding:16px 20px 22px;
  border-top:1px solid #cbd5e1;
}
.bottom-nav-inner{
  max-width:920px;
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:12px;
}
.nav-btn{
  flex:none;
  background:#ffffff;
  border:1px solid #cbd5e1;
  color:var(--text-primary);
  padding:12px 20px;
  border-radius:10px;
  font-weight:600;
  font-family:'Plus Jakarta Sans';
  cursor:pointer;
  font-size:.9rem;
  transition:all 0.2s;
}
.nav-btn:hover:not(:disabled){background:#f8fafc; border-color:#cbd5e1;}
.nav-btn.primary{
  background:var(--accent-primary);
  color:#fff;
  border:none;
  flex:1;
  text-align:center;
}
.nav-btn.primary:hover:not(:disabled){background:#4f46e5; box-shadow:0 4px 12px rgba(79, 70, 229, 0.2);}
.nav-btn:disabled{opacity:.25; cursor:not-allowed;}

.page-jump{
  flex:none;
  background:#ffffff;
  border:1px solid #cbd5e1;
  color:var(--text-primary);
  border-radius:10px;
  padding:12px;
  font-family:'Inter';
  font-size:.85rem;
  max-width:80px;
}

.center{text-align:center;}
.muted{color:var(--text-muted);}
</style>
</head>
<body>

<div class="app-shell">

  <div class="top-header">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20M4 19.5V5A2.5 2.5 0 0 1 6.5 2.5H20v14H6.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Analisis Hubungan FDP</span>
    </div>
    <div class="page-counter" id="page-counter">Halaman 1 dari 18</div>
  </div>

  <div class="section-chips" id="section-chips"></div>

  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:5.5%"></div></div>

  <div id="page-content"></div>

</div>

<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="nav-btn" id="btn-prev">‹ Kembali</button>
    <select class="page-jump" id="page-jump" title="Loncat ke halaman"></select>
    <button class="nav-btn primary" id="btn-next">Lanjut ›</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script>
// Data Halaman Interaktif (SMA Level, Clean & Rigorous)
const PAGES = [
  {
    id: 1,
    section: "Tujuan",
    title: "Misi Akademik: Teori & Hubungan FDP",
    sub: "Memahami struktur konversi Pecahan, Desimal Berulang, dan Persen secara presisi.",
    eyebrow: { text: "Tujuan Pembelajaran", type: "concept" },
    content: `
      <div class="card">
        <p>Selamat datang di modul analisis interaktif <b>FDP (Fraction, Decimal, Percent)</b>. Pada tingkat lanjutan ini, fokus utama kita adalah membedah secara analitis struktur konversi desimal terbatas dan desimal berulang tidak terbatas.</p>
        
        <div class="illustration">
          <svg viewBox="0 0 200 120" width="180">
            <rect x="15" y="15" width="170" height="90" rx="10" fill="rgba(99, 102, 241, 0.02)" stroke="var(--accent-primary)" stroke-width="2"/>
            <!-- Math icon graphics -->
            <path d="M45,45 L155,45" stroke="var(--accent-secondary)" stroke-width="3" stroke-linecap="round"/>
            <circle cx="100" cy="45" r="5" fill="var(--accent-success)"/>
            <circle cx="60" cy="75" r="10" fill="none" stroke="var(--accent-primary)" stroke-width="2"/>
            <path d="M120,65 L140,85 M140,65 L120,85" stroke="#f43f5e" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>

        <h3>🎯 Kompetensi utama yang akan Anda raih:</h3>
        <ul>
          <li><b style="color:var(--accent-secondary)">Pembuktian Aljabar Rigor</b>: Memahami logika eliminasi tak terhingga pada desimal berulang 1, 2, hingga 3 digit.</li>
          <li><b style="color:var(--accent-success)">Analisis Konversi Presisi</b>: Mampu memanipulasi bentuk pecahan campuran dan persen kompleks di atas 100%.</li>
          <li><b style="color:var(--accent-warning)">Penyelesaian Kasus Riil</b>: Menggunakan representasi fraksional desimal berulang pada simulasi kalkulasi keuangan.</li>
        </ul>
        <div class="center" style="margin-top:20px;">
          <button class="cta-btn" onclick="app.nextPage()">Mulai Evaluasi Prasyarat</button>
        </div>
      </div>
    `
  },
  {
    id: 2,
    section: "Warm-Up 1",
    title: "Warm-Up: Evaluasi Prasyarat (Soal 1 & 2)",
    sub: "Pastikan fondasi matematika dasar Anda siap sebelum masuk ke teori desimal berulang.",
    eyebrow: { text: "Warm-Up Bagian 1", type: "warmup" },
    content: `
      <div class="card">
        <div class="practice-item">
          <div class="pq"><b>Soal 1:</b> Tentukan bentuk desimal terbatas dari pecahan biasa berikut:<br><div class="center" style="font-size:1.2rem; margin:6px 0;">\\(\\frac{7}{20}\\)</div> (Gunakan tanda koma untuk desimal, contoh: 0,15)</div>
          <div class="answer-row">
            <input type="text" id="ans-wu1" placeholder="Jawaban desimal...">
            <button class="btn-sm" onclick="app.checkWarmUp(1, '0,35')">Periksa</button>
          </div>
          <div id="feedback-wu1" class="feedback"></div>
        </div>

        <div class="practice-item">
          <div class="pq"><b>Soal 2:</b> Konversikan nilai desimal murni berikut menjadi bentuk persen (%)!<br><div class="center" style="font-size:1.2rem; margin:6px 0;">\\(0,625\\)</div> (Ketik angkanya saja tanpa simbol %, contoh: 37,5)</div>
          <div class="answer-row">
            <input type="text" id="ans-wu2" placeholder="Jawaban angka persen...">
            <button class="btn-sm" onclick="app.checkWarmUp(2, '62,5')">Periksa</button>
          </div>
          <div id="feedback-wu2" class="feedback"></div>
        </div>
      </div>
    `
  },
  {
    id: 3,
    section: "Warm-Up 2",
    title: "Warm-Up: Evaluasi Prasyarat (Soal 3 & 4)",
    sub: "Menajamkan porsi penyederhanaan bentuk pecahan dan aljabar substitusi sederhana.",
    eyebrow: { text: "Warm-Up Bagian 2", type: "warmup" },
    content: `
      <div class="card">
        <div class="practice-item">
          <div class="pq"><b>Soal 3:</b> Nyatakan persentase berikut ke dalam bentuk pecahan biasa paling sederhana:<br><div class="center" style="font-size:1.2rem; margin:6px 0;">\\(12,5\\%\\)</div> (Gunakan format garis miring tanpa spasi, contoh: 3/5)</div>
          <div class="answer-row">
            <input type="text" id="ans-wu3" placeholder="Pecahan sederhana...">
            <button class="btn-sm" onclick="app.checkWarmUp(3, '1/8')">Periksa</button>
          </div>
          <div id="feedback-wu3" class="feedback"></div>
        </div>

        <div class="practice-item">
          <div class="pq"><b>Soal 4:</b> Selesaikan kalkulasi berikut dan nyatakan hasilnya dalam bentuk desimal!<br><div class="center" style="font-size:1.2rem; margin:6px 0;">\\(4,5 - \\frac{3}{4}\\)</div> (Gunakan koma, contoh: 1,25)</div>
          <div class="answer-row">
            <input type="text" id="ans-wu4" placeholder="Ketik desimal...">
            <button class="btn-sm" onclick="app.checkWarmUp(4, '3,75')">Periksa</button>
          </div>
          <div id="feedback-wu4" class="feedback"></div>
        </div>
      </div>
    `
  },
  {
    id: 4,
    section: "Warm-Up 3",
    title: "Warm-Up: Evaluasi Prasyarat (Soal 5 & 6)",
    sub: "Menguji kecepatan konversi nilai pecahan di atas satu.",
    eyebrow: { text: "Warm-Up Bagian 3", type: "warmup" },
    content: `
      <div class="card">
        <div class="practice-item">
          <div class="pq"><b>Soal 5:</b> Nyatakan bentuk desimal berikut ke dalam bentuk persen (%)!<br><div class="center" style="font-size:1.2rem; margin:6px 0;">\\(1,25\\)</div> (Ketik angkanya saja tanpa simbol %, contoh: 250)</div>
          <div class="answer-row">
            <input type="text" id="ans-wu5" placeholder="Ketik jawaban...">
            <button class="btn-sm" onclick="app.checkWarmUp(5, '125')">Periksa</button>
          </div>
          <div id="feedback-wu5" class="feedback"></div>
        </div>

        <div class="practice-item">
          <div class="pq"><b>Soal 6:</b> Berapakah nilai nyata dari \\(15\\%\\) dari bilangan \\(800\\)?<br><div class="center" style="font-size:1.2rem; margin:6px 0;">\\(15\\% \\times 800\\)</div> (Ketik angka bulat akhirnya saja, contoh: 50)</div>
          <div class="answer-row">
            <input type="text" id="ans-wu6" placeholder="Ketik jawaban...">
            <button class="btn-sm" onclick="app.checkWarmUp(6, '120')">Periksa</button>
          </div>
          <div id="feedback-wu6" class="feedback"></div>
        </div>
      </div>
    `
  },
  {
    id: 5,
    section: "Warm-Up 4",
    title: "Warm-Up: Evaluasi Prasyarat (Soal 7 & 8)",
    sub: "Mengunci fondasi pembagian pecahan tidak bulat.",
    eyebrow: { text: "Warm-Up Bagian 4", type: "warmup" },
    content: `
      <div class="card">
        <div class="practice-item">
          <div class="pq"><b>Soal 7:</b> Ubahlah pecahan tidak murni berikut menjadi desimal terbatas!<br><div class="center" style="font-size:1.2rem; margin:6px 0;">\\(\\frac{13}{5}\\)</div> (Gunakan koma, contoh: 1,4)</div>
          <div class="answer-row">
            <input type="text" id="ans-wu7" placeholder="Ketik desimal...">
            <button class="btn-sm" onclick="app.checkWarmUp(7, '2,6')">Periksa</button>
          </div>
          <div id="feedback-wu7" class="feedback"></div>
        </div>

        <div class="practice-item">
          <div class="pq"><b>Soal 8:</b> Nyatakan rasio desimal \\(0,8 : 1,2\\) ke dalam bentuk pecahan biasa paling sederhana!<br><div class="center" style="font-size:1.2rem; margin:6px 0;">\\(0,8 : 1,2\\)</div> (Gunakan format miring, contoh: 3/4)</div>
          <div class="answer-row">
            <input type="text" id="ans-wu8" placeholder="Ketik pecahan...">
            <button class="btn-sm" onclick="app.checkWarmUp(8, '2/3')">Periksa</button>
          </div>
          <div id="feedback-wu8" class="feedback"></div>
        </div>
      </div>
    `
  },
  {
    id: 6,
    section: "Real-World",
    title: "Presisi & Representasi Desimal Berulang",
    sub: "Mengapa fisika kuantum dan teknik presisi tinggi tidak menggunakan pendekatan kasar?",
    eyebrow: { text: "Koneksi Dunia Nyata", type: "reflect" },
    content: `
      <div class="card">
        <p>Banyak sistem pemrograman kalkulator komputer lama mengalami galat fatal (<i>rounding error</i>) karena tidak mampu menangani **Desimal Berulang Tidak Terbatas** dengan baik.</p>
        
        <div class="illustration">
          <svg viewBox="0 0 200 120" width="180">
            <rect x="20" y="30" width="160" height="60" rx="6" fill="none" stroke="var(--accent-secondary)" stroke-width="1.5"/>

// State Manager
class FDPApp {
  constructor() {
    this.currentPageIndex = 0;
    this.userAnswers = {};
    this.starRating = 0;
    this.init();
  }

  init() {
    this.renderChips();
    this.renderDropdown();
    this.loadPage(0);

    // Bind navigasi
    document.getElementById('btn-prev').addEventListener('click', () => this.prevPage());
    document.getElementById('btn-next').addEventListener('click', () => this.nextPage());
    document.getElementById('page-jump').addEventListener('change', (e) => this.jumpToPage(parseInt(e.target.value)));
  }

  renderChips() {
    const container = document.getElementById('section-chips');
    container.innerHTML = '';
    const sections = [
      { name: "Tujuan", range: [0, 0] },
      { name: "Warm-Up 1", range: [1, 1] },
      { name: "Warm-Up 2", range: [2, 2] },
      { name: "Warm-Up 3", range: [3, 3] },
      { name: "Warm-Up 4", range: [4, 4] },
      { name: "Real-World", range: [5, 5] },
      { name: "Konsep Inti", range: [6, 9] },
      { name: "Contoh Soal", range: [10, 11] },
      { name: "Latihan Soal", range: [12, 16] },
      { name: "Kelulusan", range: [17, 17] }
    ];

    sections.forEach((sec, idx) => {
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = sec.name;
      chip.onclick = () => this.loadPage(sec.range[0]);
      chip.id = `chip-${idx}`;
      container.appendChild(chip);
    });
  }

  updateActiveChip() {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    
    const sections = [
      { name: "Tujuan", range: [0, 0] },
      { name: "Warm-Up 1", range: [1, 1] },
      { name: "Warm-Up 2", range: [2, 2] },
      { name: "Warm-Up 3", range: [3, 3] },
      { name: "Warm-Up 4", range: [4, 4] },
      { name: "Real-World", range: [5, 5] },
      { name: "Konsep Inti", range: [6, 9] },
      { name: "Contoh Soal", range: [10, 11] },
      { name: "Latihan Soal", range: [12, 16] },
      { name: "Kelulusan", range: [17, 17] }
    ];

    const currentIdx = this.currentPageIndex;
    const activeSectionIndex = sections.findIndex(sec => currentIdx >= sec.range[0] && currentIdx <= sec.range[1]);
    
    if (activeSectionIndex !== -1) {
      const activeChip = document.getElementById(`chip-${activeSectionIndex}`);
      if (activeChip) {
        activeChip.classList.add('active');
        activeChip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }
  }

  renderDropdown() {
    const select = document.getElementById('page-jump');
    select.innerHTML = '';
    PAGES.forEach((page, index) => {
      const opt = document.createElement('option');
      opt.value = index;
      opt.textContent = `Hal ${page.id}: ${page.section}`;
      select.appendChild(opt);
    });
  }

  loadPage(index) {
    if (index < 0 || index >= PAGES.length) return;
    this.currentPageIndex = index;

    const page = PAGES[index];
    
    const contentContainer = document.getElementById('page-content');
    contentContainer.innerHTML = `
      <div class="eyebrow tp-${page.eyebrow.type}">${page.eyebrow.text}</div>
      <h1 class="page-title">${page.title}</h1>
      <p class="page-sub">${page.sub}</p>
      <div class="page-body-content">${page.content}</div>
    `;

    contentContainer.style.animation = 'none';
    contentContainer.offsetHeight; 
    contentContainer.style.animation = 'fadein 0.4s ease';

    const progressPercent = ((index + 1) / PAGES.length) * 100;
    document.getElementById('progress-fill').style.width = `${progressPercent}%`;
    document.getElementById('page-counter').textContent = `Halaman ${page.id} dari ${PAGES.length}`;
    document.getElementById('page-jump').value = index;

    document.getElementById('btn-prev').disabled = (index === 0);
    
    const nextBtn = document.getElementById('btn-next');
    if (index === PAGES.length - 1) {
      nextBtn.textContent = "Selesai ✨";
    } else {
      nextBtn.textContent = "Lanjut ›";
    }

    this.updateActiveChip();
    this.renderMath(contentContainer);
    this.restoreUserInputsOnPage();
  }

  renderMath(element) {
    try {
      renderMathInElement(element, {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '\\(', right: '\\)', display: false},
          {left: '\\[', right: '\\]', display: true}
        ],
        throwOnError: false
      });
    } catch (e) {
      console.warn("KaTeX rendering error:", e);
    }
  }

  nextPage() {
    if (this.currentPageIndex < PAGES.length - 1) {
      this.loadPage(this.currentPageIndex + 1);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      this.celebrateFinish();
    }
  }

  prevPage() {
    if (this.currentPageIndex > 0) {
      this.loadPage(this.currentPageIndex - 1);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  jumpToPage(index) {
    this.loadPage(index);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  toggleSolution(id) {
    const sol = document.getElementById(`sol-${id}`);
    if (sol) {
      sol.classList.toggle('open');
    }
  }

  restoreUserInputsOnPage() {
    const pageId = PAGES[this.currentPageIndex].id;

    // Restore text inputs
    const inputs = document.querySelectorAll('.answer-row input, textarea.reflect');
    inputs.forEach(inp => {
      if (this.userAnswers[`${pageId}_${inp.id}`] !== undefined) {
        inp.value = this.userAnswers[`${pageId}_${inp.id}`];
      }
    });

    // Restore multiple feedbacks if exist on same page
    const feedbacks = document.querySelectorAll('.feedback');
    feedbacks.forEach(fdb => {
      if (this.userAnswers[`feedback_text_${pageId}_${fdb.id}`]) {
        fdb.className = this.userAnswers[`feedback_class_${pageId}_${fdb.id}`];
        fdb.innerHTML = this.userAnswers[`feedback_text_${pageId}_${fdb.id}`];
        this.renderMath(fdb);
      }
    });

    if (pageId === 18) {
      this.renderStars();
    }
  }

  saveInputState(pageId, inputId, val, feedbackId = null, feedbackHtml = null, feedbackClass = null) {
    this.userAnswers[`${pageId}_${inputId}`] = val;
    if (feedbackId) {
      this.userAnswers[`feedback_text_${pageId}_${feedbackId}`] = feedbackHtml;
      this.userAnswers[`feedback_class_${pageId}_${feedbackId}`] = feedbackClass;
    }
  }

  // --- LOGIKA PEMERIKSAAN INTERAKTIF ---

  checkWarmUp(soalNum, answerKey) {
    const input = document.getElementById(`ans-wu${soalNum}`);
    const fdb = document.getElementById(`feedback-wu${soalNum}`);
    const val = input.value.trim().replace(/\s+/g, '');

    if (val === answerKey.replace(/\s+/g, '')) {
      fdb.className = "feedback show correct";
      fdb.innerHTML = "✨ <b>Evaluasi Tepat!</b> Jawaban Anda valid. Fondasi perhitungan Anda sangat baik.";
    } else {
      fdb.className = "feedback show wrong";
      fdb.innerHTML = `❌ <b>Kalkulasi belum sesuai.</b> Jawaban teoritis yang tepat adalah <b>${answerKey}</b>. Sederhanakan kembali langkah Anda!`;
    }
    this.saveInputState(PAGES[this.currentPageIndex].id, input.id, input.value, fdb.id, fdb.innerHTML, fdb.className);
    this.renderMath(fdb);
  }

  checkPage13() {
    const val = document.getElementById('ans-page13').value.trim().replace(/\s+/g, '');
    const fdb = document.getElementById('feedback-page13');
    if (val === "0,636363..." || val === "0,636363" || val === "0,636...") {
      fdb.className = "feedback show correct";
      fdb.innerHTML = "🎉 <b>Kalkulasi Benar!</b> \\(\\frac{7}{11} = 0,636363\\dots\\) dengan periode pengulangan sepanjang dua digit.";
    } else {
      fdb.className = "feedback show wrong";
      fdb.innerHTML = "❌ <b>Belum tepat.</b> Lakukan pembagian bersusun \\(7 : 11\\) secara teliti hingga pola pengulangan berulang (Gunakan akhiran tanda titik tiga: 0,636363...).";
    }
    this.saveInputState(13, 'ans-page13', document.getElementById('ans-page13').value, fdb.id, fdb.innerHTML, fdb.className);
    this.renderMath(fdb);
  }

  checkPage14() {
    const val = document.getElementById('ans-page14').value.trim();
    const fdb = document.getElementById('feedback-page14');
    if (val === "1") {
      fdb.className = "feedback show correct";
      fdb.innerHTML = "🎉 <b>Luar Biasa Tepat!</b> Penjumlahan tak hingga \\(0,333\\dots + 0,666\\dots\\) secara rasional bernilai \\(\\frac{3}{9} + \\frac{6}{9} = \\frac{9}{9} = 1\\).";
    } else {
      fdb.className = "feedback show wrong";
      fdb.innerHTML = "❌ <b>Belum pas.</b> Ubah ke pecahan terlebih dahulu: \\(\\frac{3}{9} + \\frac{6}{9}\\). Berapakah hasil paling sederhananya?";
    }
    this.saveInputState(14, 'ans-page14', document.getElementById('ans-page14').value, fdb.id, fdb.innerHTML, fdb.className);
    this.renderMath(fdb);
  }

  checkPage15() {
    const val = document.getElementById('ans-page15').value.trim().replace(/\s+/g, '');
    const fdb = document.getElementById('feedback-page15');
    if (val === "125/999") {
      fdb.className = "feedback show correct";
      fdb.innerHTML = "✨ <b>Teorema Terbukti!</b> Karena periode pengulangan tiga digit bernilai 125, rasionya adalah \\(\\frac{125}{999}\\). Tidak dapat disederhanakan kembali karena FPB bernilai 1.";
    } else {
      fdb.className = "feedback show wrong";
      fdb.innerHTML = "❌ <b>Pecahan salah.</b> Ingat Aturan Sembilan untuk 3 digit berulang: gunakan penyebut 999.";
    }
    this.saveInputState(15, 'ans-page15', document.getElementById('ans-page15').value, fdb.id, fdb.innerHTML, fdb.className);
    this.renderMath(fdb);
  }

  checkPage16() {
    const val = document.getElementById('ans-page16').value.trim().replace(/\s+/g, '');
    const fdb = document.getElementById('feedback-page16');
    if (val === "13") {
      fdb.className = "feedback show correct";
      fdb.innerHTML = "🎉 <b>Analisis Aljabar Sempurna!</b> \\(s = \\frac{18}{99} = \\frac{2}{11}\\). Maka \\(p=2\\), \\(q=11\\). Hasil penjumlahan: \\(2 + 11 = 13\\).";
    } else {
      fdb.className = "feedback show wrong";
      fdb.innerHTML = "❌ <b>Kalkulasi salah.</b> Ubah \\(0,181818\\dots\\) ke pecahan murni \\(\\frac{18}{99}\\), lalu sederhanakan terlebih dahulu ke bentuk paling sederhana sebelum menjumlahkan pembilang dan penyebutnya!";
    }
    this.saveInputState(16, 'ans-page16', document.getElementById('ans-page16').value, fdb.id, fdb.innerHTML, fdb.className);
    this.renderMath(fdb);
  }

  checkPage17() {
    const val = document.getElementById('ans-page17').value.trim().replace(/\s+/g, '');
    const fdb = document.getElementById('feedback-page17');
    if (val === "5/8,65%,0,66,2/3") {
      fdb.className = "feedback show correct";
      fdb.innerHTML = "👑 <b>Analisis FDP Sempurna!</b> Urutan Anda tepat. Konversi desimal teoritisnya adalah:<br>• \\(\\frac{5}{8} = 0,625\\)<br>• \\(65\\% = 0,650\\)<br>• \\(0,66 = 0,660\\)<br>• \\(\\frac{2}{3} = 0,666\\dots\\)";
    } else {
      fdb.className = "feedback show wrong";
      fdb.innerHTML = "❌ <b>Urutan belum presisi.</b> Ubahlah semua bentuk ke representasi desimal terbatas/tak terbatas dahulu, lalu bandingkan posisinya!";
    }
    this.saveInputState(17, 'ans-page17', document.getElementById('ans-page17').value, fdb.id, fdb.innerHTML, fdb.className);
    this.renderMath(fdb);
  }

  setStar(num) {
    this.starRating = num;
    this.renderStars();
    this.userAnswers['starRating'] = num;
  }

  renderStars() {
    const stars = document.querySelectorAll('#star-container span');
    const status = document.getElementById('star-status');
    if (!stars.length) return;

    stars.forEach((star, index) => {
      if (index < this.starRating) {
        star.classList.add('on');
      } else {
        star.classList.remove('on');
      }
    });

    const messages = [
      "Masih membutuhkan peninjauan ulang materi.",
      "Cukup memahami alur kalkulasi dasar.",
      "Memahami esensi pembuktian Aturan Sembilan.",
      "Menguasai aljabar eliminasi desimal berulang.",
      "Luar biasa! Siap untuk tantangan matematika olimpiade!"
    ];
    status.textContent = messages[this.starRating - 1] || "Berikan peringkat bintang Anda...";
  }

  renderFinalStats() {
    const box = document.getElementById('final-stats-box');
    if (!box) return;

    let correctWarmUps = 0;
    let correctPractices = 0;

    // Count Warm-ups
    for (let pNum = 2; pNum <= 5; pNum++) {
      for (let sIdx = 1; sIdx <= 2; sIdx++) {
        const sNum = (pNum - 2) * 2 + sIdx;
        const fdbClass = this.userAnswers[`feedback_class_${pNum}_feedback-wu${sNum}`];
        if (fdbClass && fdbClass.includes('correct')) {
          correctWarmUps++;
        }
      }
    }

    // Count Practices
    const practicePages = [13, 14, 15, 16, 17];
    practicePages.forEach(pId => {
      const fdbClass = this.userAnswers[`feedback_class_${pId}_feedback-page${pId}`];
      if (fdbClass && fdbClass.includes('correct')) {
        correctPractices++;
      }
    });

    box.innerHTML = `
      <h4 style="margin:0 0 8px; color:var(--accent-success);">📊 Laporan Evaluasi Kognitif:</h4>
      <p style="margin:4px 0; font-size:0.92rem;">Soal Prasyarat (Warm-up) Benar: <b>${correctWarmUps} dari 8</b></p>
      <p style="margin:4px 0; font-size:0.92rem;">Soal Pembuktian Utama Benar: <b>${correctPractices} dari 5</b></p>
      <p style="margin:4px 0; font-size:0.92rem;">Predikat Akademik: <b style="color:var(--accent-primary)">Master Konversi Fraksional</b></p>
    `;
  }

  celebrateFinish() {
    const modal = document.createElement('div');
    modal.style.position = 'fixed';
    modal.style.inset = '0';
    modal.style.background = 'rgba(9, 13, 26, 0.95)';
    modal.style.zIndex = '999';
    modal.style.display = 'flex';
    modal.style.alignItems = 'center';
    modal.style.justifyContent = 'center';
    modal.style.padding = '20px';

    modal.innerHTML = `
      <div class="card" style="max-width:480px; text-align:center; border:2px solid var(--accent-primary); box-shadow:0 0 40px rgba(99, 102, 241, 0.4);">
        <h2 style="color:var(--accent-success); font-family:'Plus Jakarta Sans'; margin-top:0;">🎓 Evaluasi Tuntas!</h2>
        <p>Anda telah menyelesaikan seluruh modul pemodelan aljabar konversi pecahan, desimal berulang, dan persen.</p>
        <p style="font-size:0.9rem; color:var(--text-muted);">Seluruh performa penyelesaian soal Anda telah direkam.</p>
        <button class="cta-btn" id="modal-close-btn" style="margin-top:10px;">Lihat Lembar Hasil Akhir</button>
      </div>
    `;

    document.body.appendChild(modal);
    document.getElementById('modal-close-btn').onclick = () => {
      modal.remove();
      this.loadPage(PAGES.length - 1);
    };
  }
}

// Start Application on Load
let app;
window.onload = function() {
  app = new FDPApp();
};
</script>
