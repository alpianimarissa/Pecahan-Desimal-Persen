<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Interaktif FDP — Analisis Desimal Berulang</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<style>
:root {
  --bg-0: #f8fafc; /* Slate 50 */
  --bg-1: #f1f5f9; /* Slate 100 */
  --bg-2: #e2e8f0; /* Slate 200 */
  --card: #ffffff;
  --card-brd: #e2e8f0;
  --accent-primary: #4f46e5; /* Indigo 600 */
  --accent-secondary: #2563eb; /* Blue 600 */
  --accent-success: #059669; /* Emerald 600 */
  --accent-danger: #dc2626; /* Red 600 */
  --accent-warning: #d97706; /* Amber 600 */
  --text-primary: #0f172a; /* Slate 900 */
  --text-muted: #475569; /* Slate 600 */
  --shadow-glow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.03);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background:
    radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.03) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.03) 0%, transparent 40%),
    var(--bg-0);
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

h1, h2, h3, .font-display {
  font-family: 'Plus Jakarta Sans', sans-serif;
  letter-spacing: -0.02em;
}

.app-shell {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 20px 140px;
  position: relative;
  z-index: 1;
  min-height: 100vh;
}

.top-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 4px 16px;
  border-bottom: 1px solid rgba(15, 23, 42, 0.08);
  margin-bottom: 20px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'Plus Jakarta Sans';
  font-weight: 700;
  font-size: 1.15rem;
  color: var(--text-primary);
}

.brand svg {
  width: 28px;
  height: 28px;
  fill: none;
  stroke: var(--accent-primary);
  stroke-width: 2;
}

.score-counter {
  font-size: .85rem;
  font-weight: 700;
  color: var(--accent-primary);
  background: #e0e7ff;
  border: 1px solid rgba(79, 70, 229, 0.15);
  padding: 6px 14px;
  border-radius: 999px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.02);
}

.progress-track {
  height: 6px;
  border-radius: 999px;
  background: #e2e8f0;
  overflow: hidden;
  margin-bottom: 24px;
}

.progress-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary));
  transition: width .3s ease;
}

.card {
  background: var(--card);
  border: 1px solid var(--card-brd);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-glow);
}

.page-title {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--text-primary);
  margin: 0 0 6px;
}

.page-sub {
  color: var(--text-muted);
  font-size: .95rem;
  margin: 0 0 24px;
  line-height: 1.6;
}

.eyebrow {
  display: inline-block;
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #fff;
  background: var(--accent-secondary);
  padding: 5px 12px;
  border-radius: 6px;
  margin-bottom: 12px;
}

.option-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin: 18px 0;
}

.option-btn {
  background: #ffffff;
  border: 1.5px solid var(--card-brd);
  border-radius: 12px;
  padding: 16px;
  text-align: left;
  font-family: 'Inter', sans-serif;
  font-size: .98rem;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 12px;
}

.option-btn:hover:not(:disabled) {
  border-color: var(--accent-primary);
  background: #f8fafc;
}

.option-btn.correct {
  background: rgba(16, 185, 129, 0.08);
  border-color: var(--accent-success);
  color: #065f46;
  font-weight: 600;
}

.option-btn.wrong {
  background: rgba(220, 38, 38, 0.08);
  border-color: var(--accent-danger);
  color: #991b1b;
}

.option-btn:disabled {
  cursor: default;
}

.badge-letter {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #f1f5f9;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: .85rem;
  flex-shrink: 0;
}

.option-btn.correct .badge-letter {
  background: var(--accent-success);
  color: #ffffff;
}

.option-btn.wrong .badge-letter {
  background: var(--accent-danger);
  color: #ffffff;
}

.feedback-container {
  margin-top: 16px;
  padding: 18px;
  border-radius: 12px;
  display: none;
  animation: fadein 0.3s ease;
}

.feedback-container.show {
  display: block;
}

.feedback-container.correct-style {
  background: rgba(16, 185, 129, 0.06);
  border-left: 4px solid var(--accent-success);
  color: #065f46;
}

.feedback-container.wrong-style {
  background: rgba(220, 38, 38, 0.06);
  border-left: 4px solid var(--accent-danger);
  color: #991b1b;
}

.explanation-title {
  font-weight: 700;
  font-family: 'Plus Jakarta Sans';
  font-size: .95rem;
  margin-bottom: 6px;
}

.explanation-body {
  font-size: .92rem;
  line-height: 1.65;
  color: var(--text-primary);
}

.grid-navigation {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 8px;
  margin-top: 20px;
}

@media (max-width: 640px) {
  .grid-navigation {
    grid-template-columns: repeat(5, 1fr);
  }
}

.nav-dot {
  aspect-ratio: 1;
  background: #ffffff;
  border: 1px solid var(--card-brd);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .8rem;
  font-weight: 700;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}

.nav-dot:hover {
  border-color: var(--accent-primary);
  color: var(--accent-primary);
}

.nav-dot.active {
  background: var(--accent-primary);
  color: #ffffff;
  border-color: transparent;
}

.nav-dot.answered-correct {
  background: rgba(16, 185, 129, 0.1);
  color: var(--accent-success);
  border-color: var(--accent-success);
}

.nav-dot.answered-wrong {
  background: rgba(220, 38, 38, 0.1);
  color: var(--accent-danger);
  border-color: var(--accent-danger);
}

.star-rate {
  display: flex;
  gap: 8px;
  font-size: 1.8rem;
  cursor: pointer;
  margin: 10px 0 6px;
}

.star-rate span { opacity: .25; transition: .15s; }
.star-rate span.on { opacity: 1; color: var(--accent-warning); }

textarea.reflect {
  width: 100%;
  min-height: 80px;
  background: #ffffff;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  padding: 14px;
  color: var(--text-primary);
  font-family: 'Inter';
  font-size: .93rem;
  resize: vertical;
  transition: border-color 0.2s;
}

textarea.reflect:focus { outline: none; border-color: var(--accent-primary); }

.formula-box {
  background: rgba(99, 102, 241, 0.03);
  border: 1px solid rgba(99, 102, 241, 0.12);
  border-radius: 10px;
  padding: 16px;
  margin: 14px 0;
  text-align: center;
  overflow-x: auto;
}

.center { text-align: center; }
.cta-btn {
  display: inline-block;
  margin-top: 10px;
  background: var(--accent-primary);
  color: #fff;
  border: none;
  padding: 14px 28px;
  border-radius: 10px;
  font-weight: 700;
  font-family: 'Plus Jakarta Sans';
  font-size: 1rem;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s;
}
.cta-btn:hover {
  background: #4f46e5;
  box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
}

.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 5;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(12px);
  padding: 16px 20px 22px;
  border-top: 1px solid #cbd5e1;
}
.bottom-nav-inner {
  max-width: 960px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 12px;
}
.nav-btn {
  flex: none;
  background: #ffffff;
  border: 1px solid #cbd5e1;
  color: var(--text-primary);
  padding: 12px 20px;
  border-radius: 10px;
  font-weight: 600;
  font-family: 'Plus Jakarta Sans';
  cursor: pointer;
  font-size: .9rem;
  transition: all 0.2s;
}
.nav-btn:hover:not(:disabled) { background: #f8fafc; border-color: #cbd5e1; }
.nav-btn.primary {
  background: var(--accent-primary);
  color: #fff;
  border: none;
  flex: 1;
  text-align: center;
}
.nav-btn.primary:hover:not(:disabled) {
  background: #4f46e5;
  box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
}
.nav-btn:disabled { opacity: .25; cursor: not-allowed; }
.page-jump {
  flex: none;
  background: #ffffff;
  border: 1px solid #cbd5e1;
  color: var(--text-primary);
  border-radius: 10px;
  padding: 12px;
  font-family: 'Inter';
  font-size: .85rem;
  max-width: 80px;
}
.page-counter {
  font-size: .8rem;
  color: var(--text-muted);
  background: var(--card);
  border: 1px solid var(--card-brd);
  padding: 6px 14px;
  border-radius: 999px;
  white-space: nowrap;
  box-shadow: 0 1px 2px rgba(0,0,0,0.02);
}
.section-chips {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 2px 2px 14px;
  scrollbar-width: none;
}
.section-chips::-webkit-scrollbar { display: none; }
.chip {
  flex: none;
  font-size: .72rem;
  font-weight: 600;
  padding: 8px 14px;
  border-radius: 999px;
  background: #ffffff;
  border: 1px solid var(--card-brd);
  color: var(--text-muted);
  white-space: nowrap;
  transition: .2s;
  cursor: pointer;
  box-shadow: 0 1px 2px rgba(0,0,0,0.02);
}
.chip:hover {
  border-color: #cbd5e1;
  color: var(--text-primary);
}
.chip.active {
  background: var(--accent-primary);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
}
</style>
</head>
<body>

<div class="app-shell">

  <div class="top-header">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20M4 19.5V5A2.5 2.5 0 0 1 6.5 2.5H20v14H6.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Evaluasi Akademik FDP</span>
    </div>
    <div class="page-counter" id="page-counter">Halaman 1 dari 32</div>
    <div class="score-counter" id="score-counter">Benar: 0 / 30</div>
  </div>

  <div class="section-chips" id="section-chips"></div>

  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width: 0%"></div></div>

  <div id="page-content"></div>

</div>

<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="nav-btn" id="btn-prev" disabled>‹ Kembali</button>
    <select class="page-jump" id="page-jump" title="Loncat ke halaman"></select>
    <button class="nav-btn primary" id="btn-next">Lanjut ›</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script>
// Database Soal Matematika Tingkat SMA (30 Soal FDP & Desimal Berulang)
const QUESTIONS = [
  {
    id: 1,
    eyebrow: "Konversi Desimal Berulang 1 Digit",
    title: "Deret Geometri Tak Hingga Sederhana",
    sub: "Konversikan desimal berulang paling dasar menuju bentuk pecahan.",
    q: "Ubah bentuk desimal berulang berikut menjadi pecahan biasa yang paling sederhana:<br><div class='center' style='font-size:1.3rem; margin:10px 0;'>\\(0,3333\\dots\\)</div>",
    options: [
      "\\(\\frac{1}{3}\\)",
      "\\(\\frac{3}{10}\\)",
      "\\(\\frac{33}{100}\\)",
      "\\(\\frac{1}{9}\\)"
    ],
    correctIdx: 0,
    explain: "Misalkan \\(x = 0,3333\\dots\\). Maka, \\(10x = 3,3333\\dots\\). Dengan mengurangkan kedua persamaan:<br>\\(10x - x = 3,3333\\dots - 0,3333\\dots\\)<br>\\(9x = 3\\)<br>\\(x = \\frac{3}{9} = \\frac{1}{3}\\)."
  },
  {
    id: 2,
    eyebrow: "Konversi Desimal Berulang 1 Digit",
    title: "Nilai Limit Desimal Sederhana",
    sub: "Menelaah nilai pecahan dasar satu digit berulang.",
    q: "Berapakah bentuk pecahan murni dari nilai berikut?<br><div class='center' style='font-size:1.3rem; margin:10px 0;'>\\(0,6666\\dots\\)</div>",
    options: [
      "\\(\\frac{6}{10}\\)",
      "\\(\\frac{2}{3}\\)",
      "\\(\\frac{3}{5}\\)",
      "\\(\\frac{66}{99}\\) (belum sederhana)"
    ],
    correctIdx: 1,
    explain: "Misalkan \\(x = 0,6666\\dots\\). Maka \\(10x = 6,6666\\dots\\). Pengurangan aljabar menghasilkan:<br>\\(9x = 6 \\implies x = \\frac{6}{9} = \\frac{2}{3}\\)."
  },
  {
    id: 3,
    eyebrow: "Aturan Sembilan Dasar",
    title: "Aturan Pembagi Sembilan",
    sub: "Memahami representasi pecahan satu digit berulang terkecil.",
    q: "Jika desimal berulang bernilai \\(0,1111\\dots\\), pecahan sederhana mana yang tepat mewakili nilai tersebut?",
    options: [
      "\\(\\frac{1}{10}\\)",
      "\\(\\frac{1}{99}\\)",
      "\\(\\frac{1}{9}\\)",
      "\\(\\frac{11}{100}\\)"
    ],
    correctIdx: 2,
    explain: "Sesuai pembuktian aljabar:<br>\\(10x = 1,111\\dots\\)<br>\\(x = 0,111\\dots\\)<br>\\(9x = 1 \\implies x = \\frac{1}{9}\\)."
  },
  {
    id: 4,
    eyebrow: "Aturan Sembilan Dasar",
    title: "Representasi Desimal Berulang Tinggi",
    sub: "Mencari pecahan dari satu digit bernilai tinggi yang berulang.",
    q: "Tentukan bentuk pecahan paling sederhana dari desimal berulang berikut:<br><div class='center' style='font-size:1.3rem; margin:10px 0;'>\\(0,7777\\dots\\)</div>",
    options: [
      "\\(\\frac{7}{9}\\)",
      "\\(\\frac{77}{100}\\)",
      "\\(\\frac{7}{10}\\)",
      "\\(\\frac{3}{4}\\)"
    ],
    correctIdx: 0,
    explain: "Berdasarkan teorema generalisasi desimal berulang 1 digit: \\(0,aaaa\\dots = \\frac{a}{9}\\). Maka \\(0,7777\\dots = \\frac{7}{9}\\)."
  },
  {
    id: 5,
    eyebrow: "Konversi Desimal Berulang 2 Digit",
    title: "Pengulangan Dua Angka Independen",
    sub: "Memahami manipulasi aljabar dengan pengali seratus.",
    q: "Nyatakan desimal berulang berikut sebagai pecahan biasa paling sederhana:<br><div class='center' style='font-size:1.3rem; margin:10px 0;'>\\(0,161616\\dots\\)</div>",
    options: [
      "\\(\\frac{16}{100}\\)",
      "\\(\\frac{16}{99}\\)",
      "\\(\\frac{4}{25}\\)",
      "\\(\\frac{16}{90}\\)"
    ],
    correctIdx: 1,
    explain: "Karena periode pengulangan terdiri atas 2 digit (16), kita gunakan pengali \\(10^2 = 100\\):<br>\\(100x = 16,161616\\dots\\)<br>\\(x = 0,161616\\dots\\)<br>\\(99x = 16 \\implies x = \\frac{16}{99}\\)."
  },
  {
    id: 6,
    eyebrow: "Konversi Desimal Berulang 2 Digit",
    title: "Penyederhanaan Fraksional Kompleks",
    sub: "Mengonversi desimal berulang dua digit dengan penyederhanaan tingkat lanjut.",
    q: "Tentukan nilai pecahan paling sederhana dari bentuk desimal berikut:<br><div class='center' style='font-size:1.3rem; margin:10px 0;'>\\(0,272727\\dots\\)</div>",
    options: [
      "\\(\\frac{27}{100}\\)",
      "\\(\\frac{27}{99}\\)",
      "\\(\\frac{3}{11}\\)",
      "\\(\\frac{9}{33}\\)"
    ],
    correctIdx: 2,
    explain: "Konversi dasar menghasilkan pecahan \\(\\frac{27}{99}\\). Kedua ruas dibagi dengan FPB dari 27 dan 99, yaitu 9:<br>\\(\\frac{27 \\div 9}{99 \\div 9} = \\frac{3}{11}\\)."
  },
  {
    id: 7,
    eyebrow: "Konversi Desimal Berulang 2 Digit",
    title: "Periode Angka Kuadratik",
    sub: "Menemukan bentuk fraksional sederhana dari periode berulang berkelipatan 9.",
    q: "Bentuk pecahan biasa yang setara dengan desimal berulang berikut adalah:<br><div class='center' style='font-size:1.3rem; margin:10px 0;'>\\(0,363636\\dots\\)</div>",
    options: [
      "\\(\\frac{4}{11}\\)",
      "\\(\\frac{36}{100}\\)",
      "\\(\\frac{9}{25}\\)",
      "\\(\\frac{36}{90}\\)"
    ],
    correctIdx: 0,
    explain: "Nilai konversinya adalah \\(\\frac{36}{99}\\). Jika disederhanakan dengan membagi pembilang dan penyebut dengan 9:<br>\\(\\frac{36 \\div 9}{99 \\div 9} = \\frac{4}{11}\\)."
  },
  {
    id: 8,
    section: "Desimal Berulang",
    eyebrow: "Konversi Desimal Berulang 2 Digit",
    title: "Periode Angka Nol-Sembilan",
    sub: "Menganalisis desimal berulang dengan awalan nol.",
    q: "Ubah bentuk desimal berikut menjadi pecahan biasa yang paling sederhana:<br><div class='center' style='font-size:1.3rem; margin:10px 0;'>\\(0,090909\\dots\\)</div>",
    options: [
      "\\(\\frac{9}{100}\\)",
      "\\(\\frac{1}{11}\\)",
      "\\(\\frac{1}{111}\\)",
      "\\(\\frac{9}{90}\\)"
    ],
    correctIdx: 1,
    explain: "Karena periode berulangnya adalah 09, maka rasionya ditulis \\(\\frac{9}{99}\\). Jika disederhanakan dengan membagi pembilang dan penyebut dengan 9, diperoleh \\(\\frac{1}{11}\\)."
  },
  {
    id: 9,
    eyebrow: "Konversi Desimal Berulang 3 Digit",
    title: "Pola Pengulangan Tiga Digit",
    sub: "Pembuktian dengan sistem persamaan linear aljabar pengali 1000.",
    q: "Konversikan desimal berulang tiga digit berikut menjadi pecahan biasa yang paling sederhana:<br><div class='center' style='font-size:1.3rem; margin:10px 0;'>\\(0,125125125\\dots\\)</div>",
    options: [
      "\\(\\frac{125}{1000}\\)",
      "\\(\\frac{125}{999}\\)",
      "\\(\\frac{1}{8}\\)",
      "\\(\\frac{125}{990}\\)"
    ],
    correctIdx: 1,
    explain: "Misalkan \\(z = 0,125125125\\dots\\). Karena polanya 3 digit, kalikan dengan 1000:<br>\\(1000z = 125,125125\\dots\\)<br>\\(1000z - z = 125 \\implies 999z = 125 \\implies z = \\frac{125}{999}\\)."
  },
  {
    id: 10,
    eyebrow: "Konversi Desimal Berulang 2 Digit",
    title: "Kalkulasi Fraksional Desimal Sembilan Puluh Sembilan",
    sub: "Penyederhanaan dua digit kelipatan besar.",
    q: "Pecahan biasa paling sederhana dari desimal berulang \\(0,454545\\dots\\) adalah...",
    options: [
      "\\(\\frac{9}{20}\\)",
      "\\(\\frac{45}{99}\\) (belum sederhana)",
      "\\(\\frac{5}{11}\\)",
      "\\(\\frac{45}{100}\\)"
    ],
    correctIdx: 2,
    explain: "Desimal berulang \\(0,454545\\dots = \\frac{45}{99}\\). Pembilang dan penyebut disederhanakan dengan dibagi 9:<br>\\(\\frac{45 \\div 9}{99 \\div 9} = \\frac{5}{11}\\)."
  },
  {
    id: 11,
    eyebrow: "Konversi Desimal Berulang 2 Digit",
    title: "Analisis Desimal Berulang Delapan Belas",
    sub: "Konversi rasio desimal 18.",
    q: "Bentuk pecahan biasa paling sederhana dari \\(0,181818\\dots\\) adalah...",
    options: [
      "\\(\\frac{9}{50}\\)",
      "\\(\\frac{2}{11}\\)",
      "\\(\\frac{18}{100}\\)",
      "\\(\\frac{18}{99}\\) (belum sederhana)"
    ],
    correctIdx: 1,
    explain: "Desimal \\(0,181818\\dots = \\frac{18}{99}\\). Dibagi dengan FPB-nya yaitu 9:<br>\\(\\frac{18 \\div 9}{99 \\div 9} = \\frac{2}{11}\\)."
  },
  {

// App State
class QuizApp {
  constructor() {
    this.currentIdx = -1; // -1: Welcome Page, QUESTIONS.length: Result Page
    this.answersState = Array(QUESTIONS.length).fill(null); // Menyimpan pilihan jawaban user
    this.userAnswers = {}; // Inisialisasi awal untuk menghindari error pembacaan state
    this.starRating = 0;
    this.init();
  }

  init() {
    this.renderDropdown();
    this.loadPage(-1);

    // Bind navigasi tombol
    document.getElementById('btn-prev').addEventListener('click', () => this.prevPage());
    document.getElementById('btn-next').addEventListener('click', () => this.nextPage());
    document.getElementById('page-jump').addEventListener('change', (e) => this.jumpToPage(parseInt(e.target.value)));
  }

  renderChips() {
    const container = document.getElementById('section-chips');
    container.innerHTML = '';
    
    // Grouping halaman untuk chips navigasi cepat
    const chipsData = [
      { name: "Selamat Datang", index: -1 },
      { name: "1 Digit Berulang", index: 0 },
      { name: "2 Digit Berulang", index: 4 },
      { name: "3 Digit Berulang", index: 8 },
      { name: "Campuran", index: 11 },
      { name: "Persen Kompleks", index: 17 },
      { name: "Analisis Aljabar", index: 25 },
      { name: "Sertifikasi", index: QUESTIONS.length }
    ];

    chipsData.forEach((sec) => {
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = sec.name;
      chip.onclick = () => this.loadPage(sec.index);
      
      // Deteksi active chip
      let isActive = false;
      if (sec.index === -1 && this.currentIdx === -1) isActive = true;
      else if (sec.index === QUESTIONS.length && this.currentIdx === QUESTIONS.length) isActive = true;
      else if (sec.index >= 0 && sec.index < QUESTIONS.length && this.currentIdx >= 0 && this.currentIdx < QUESTIONS.length) {
        // Cari chip terdekat dari index aktif
        const cur = this.currentIdx;
        if (cur >= 0 && cur <= 3 && sec.index === 0) isActive = true;
        else if (cur >= 4 && cur <= 7 && sec.index === 4) isActive = true;
        else if (cur >= 8 && cur <= 10 && sec.index === 8) isActive = true;
        else if (cur >= 11 && cur <= 16 && sec.index === 11) isActive = true;
        else if (cur >= 17 && cur <= 24 && sec.index === 17) isActive = true;
        else if (cur >= 25 && cur < QUESTIONS.length && sec.index === 25) isActive = true;
      }

      if (isActive) {
        chip.classList.add('active');
      }
      container.appendChild(chip);
    });
  }

  renderDropdown() {
    const select = document.getElementById('page-jump');
    select.innerHTML = '';
    
    const optIntro = document.createElement('option');
    optIntro.value = -1;
    optIntro.textContent = "Intro";
    select.appendChild(optIntro);

    QUESTIONS.forEach((q, idx) => {
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = `Soal ${q.id}`;
      select.appendChild(opt);
    });

    const optEnd = document.createElement('option');
    optEnd.value = QUESTIONS.length;
    optEnd.textContent = "Sertifikasi";
    select.appendChild(optEnd);
  }

  loadPage(index) {
    if (index < -1 || index > QUESTIONS.length) return;
    this.currentIdx = index;

        <div class="card center">
          <div class="eyebrow tp-reflect">Sertifikasi Selesai</div>
          <h1 class="page-title">Analisis Hasil Ujian Anda</h1>
          <p class="page-sub">Berikut adalah rekapitulasi performa kuantitatif pengerjaan kuis.</p>

          <div style="font-size:4rem; font-weight:800; color:var(--accent-primary); line-height:1; margin-bottom:10px;">
            ${pct}<span style="font-size:1.8rem; font-weight:500; color:var(--text-muted);">%</span>
          </div>

          <p class="muted" style="margin-bottom:24px;">Berhasil menjawab benar <b>${totalCorrect}</b> dari <b>${QUESTIONS.length}</b> butir soal evaluasi.</p>

          <div class="card" style="border-left:4px solid ${badgeColor}; background:rgba(248,250,252,0.6); text-align:left; margin-bottom:24px;">
            <div style="font-size:.8rem; text-transform:uppercase; font-weight:800; color:var(--text-muted); letter-spacing:.05em;">Pangkat Kelulusan:</div>
            <div style="font-size:1.2rem; font-weight:800; color:var(--text-primary); margin:4px 0 8px;">${badge}</div>
            <p style="margin:0; font-size:.92rem; color:var(--text-muted); line-height:1.6;">${statusText}</p>
          </div>

          <h3 style="text-align:left; margin-top:20px;">Evaluasi Mandiri Pemahaman</h3>
          <p style="text-align:left; font-size:.92rem; color:var(--text-muted);">Bagaimana tingkat kesulitan kuis ini menurut sudut pandang analitis Anda?</p>
          <div class="star-rate" id="star-container">
            <span onclick="app.setStar(1)">★</span>
            <span onclick="app.setStar(2)">★</span>
            <span onclick="app.setStar(3)">★</span>
            <span onclick="app.setStar(4)">★</span>
            <span onclick="app.setStar(5)">★</span>
          </div>
          <p id="star-status" class="muted" style="font-size:0.85rem; text-align:left; margin-bottom:20px;">Berikan peringkat bintang Anda...</p>

          <textarea class="reflect" id="reflect-text" placeholder="Tuliskan ulasan atau refleksi belajar Anda tentang pembuktian aljabar desimal berulang..."></textarea>

          <div style="margin-top:24px;">
            <button class="cta-btn" onclick="app.resetQuiz()">🔁 Ulangi Kuis</button>
          </div>
        </div>
      `;
      document.getElementById('btn-prev').disabled = false;
      document.getElementById('btn-next').textContent = "Selesai ✨";
    } else {
      // QUIZ QUESTION PAGE
      const q = QUESTIONS[index];
      
      let optionsHtml = q.options.map((opt, oIdx) => {
        let btnClass = '';
        let isCorrectBadge = '';
        const answered = this.answersState[index];
        
        if (answered !== null) {
          if (oIdx === q.correctIdx) {
            btnClass = 'correct';
          } else if (answered === oIdx) {
            btnClass = 'wrong';
          }
        }

        return `
          <button class="option-btn ${btnClass}" onclick="app.submitAnswer(${oIdx})" ${answered !== null ? 'disabled' : ''}>
            <span class="badge-letter">${['A', 'B', 'C', 'D'][oIdx]}</span>
            <span>${opt}</span>
          </button>
        `;
      }).join('');

      let feedbackClass = 'feedback-container';
      let feedbackTitle = '';
      if (this.answersState[index] !== null) {
        feedbackClass += ' show ' + (this.answersState[index] === q.correctIdx ? 'correct-style' : 'wrong-style');
        feedbackTitle = this.answersState[index] === q.correctIdx ? '✓ Jawaban Anda Benar!' : '✗ Jawaban Belum Tepat!';
      }

      contentContainer.innerHTML = `
        <div class="card">
          <div class="eyebrow">${q.eyebrow}</div>
          <h1 class="page-title" style="font-size:1.35rem; font-weight:700; margin-top:4px;">Soal ${q.id}: ${q.title}</h1>
          <p class="page-sub" style="margin-bottom:16px;">${q.sub}</p>

          <p style="font-size:1.02rem; line-height:1.7; margin-bottom:20px;">${q.q}</p>

          <div class="option-grid">${optionsHtml}</div>

          <div class="${feedbackClass}" id="feedback-panel">
            <div class="explanation-title">${feedbackTitle}</div>
            <div class="explanation-body">
              <b>Analisis Formal Aljabar:</b><br>
              ${q.explain}
            </div>
          </div>
        </div>

        <div class="card" style="padding:16px;">
          <h3 style="font-size:.9rem; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); margin-bottom:12px;">Peta Butir Soal Evaluasi</h3>
          <div class="grid-navigation" id="grid-nav"></div>
        </div>
      `;

      this.renderGridNavigation();
      document.getElementById('btn-prev').disabled = false;
      document.getElementById('btn-next').textContent = (index === QUESTIONS.length - 1) ? "Hasil Akhir ›" : "Lanjut ›";
    }

    this.updateProgressFill();
    this.renderChips();
    this.renderMath(contentContainer);
    document.getElementById('page-jump').value = index;

    // Restore rating / reflection on end page
    if (index === QUESTIONS.length) {
      this.renderStars();
      if (this.userAnswers['reflection']) {
        document.getElementById('reflect-text').value = this.userAnswers['reflection'];
      }
      // Bind auto save for reflection
      document.getElementById('reflect-text').addEventListener('input', (e) => {
        this.userAnswers['reflection'] = e.target.value;
      });
    }
  }

  submitAnswer(optIdx) {
    if (this.answersState[this.currentIdx] !== null) return;
    this.answersState[this.currentIdx] = optIdx;
    
    // Hitung score baru
    this.updateScoreCounter();
    
    // Muat ulang halaman saat ini untuk menampilkan penjelasan dan kunci warna
    this.loadPage(this.currentIdx);
  }

  countCorrectAnswers() {
    return this.answersState.reduce((acc, ans, qIdx) => {
      return acc + (ans === QUESTIONS[qIdx].correctIdx ? 1 : 0);
    }, 0);
  }

  updateScoreCounter() {
    const totalCorrect = this.countCorrectAnswers();
    document.getElementById('score-counter').textContent = `Benar: ${totalCorrect} / ${QUESTIONS.length}`;
  }

  updateProgressFill() {
    let progressPercent = 0;
    if (this.currentIdx === -1) {
      progressPercent = 3;
    } else if (this.currentIdx === QUESTIONS.length) {
      progressPercent = 100;
    } else {
      progressPercent = Math.round(((this.currentIdx + 1) / QUESTIONS.length) * 94) + 3;
    }
    document.getElementById('progress-fill').style.width = `${progressPercent}%`;
    document.getElementById('page-counter').textContent = `Halaman ${this.currentIdx + 2} dari ${QUESTIONS.length + 2}`;
  }

  renderGridNavigation() {
    const grid = document.getElementById('grid-nav');
    if (!grid) return;
    grid.innerHTML = '';

    QUESTIONS.forEach((q, idx) => {
      const dot = document.createElement('div');
      dot.className = 'nav-dot';
      dot.textContent = q.id;
      
      const answered = this.answersState[idx];
      if (idx === this.currentIdx) {
        dot.classList.add('active');
      } else if (answered !== null) {
        if (answered === q.correctIdx) {
          dot.classList.add('answered-correct');
        } else {
          dot.classList.add('answered-wrong');
        }
      }

      dot.onclick = () => this.loadPage(idx);
      grid.appendChild(dot);
    });
  }

  renderMath(element) {
    try {
      renderMathInElement(element, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '\\(', right: '\\)', display: false },
          { left: '\\[', right: '\\]', display: true }
        ],
        throwOnError: false
      });
    } catch (e) {
      console.warn("KaTeX rendering error:", e);
    }
  }

  nextPage() {
    this.loadPage(this.currentIdx + 1);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  prevPage() {
    this.loadPage(this.currentIdx - 1);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  jumpToPage(index) {
    this.loadPage(index);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  setStar(num) {
    this.starRating = num;
    this.renderStars();
  }

  renderStars() {
    const stars = document.querySelectorAll('#star-container span');
    const status = document.getElementById('star-status');
    if (!stars.length) return;

    stars.forEach((star, index) => {
      if (index < this.starRating) {
        star.classList.add('on');
      } else {
        star.classList.remove('on');
      }
    });

    const messages = [
      "Perlu tinjauan komprehensif teori dasar.",
      "Cukup menantang, membutuhkan pemahaman lanjutan.",
      "Tingkat kesulitan berimbang dengan silabus SMA.",
      "Sangat menantang ketelitian manipulasi aljabar.",
      "Luar biasa rigor! Sangat direkomendasikan untuk latihan olimpiade."
    ];
    status.textContent = messages[this.starRating - 1] || "Berikan peringkat bintang Anda...";
  }

  resetQuiz() {
    this.answersState = Array(QUESTIONS.length).fill(null);
    this.starRating = 0;
    this.userAnswers = {};
    this.updateScoreCounter();
    this.loadPage(-1);
  }
}

// Inisialisasi Aplikasi Saat Memuat Window
let app;
window.onload = function() {
  app = new QuizApp();
};
</script>
</body>
</html>
